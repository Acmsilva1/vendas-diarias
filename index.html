<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendas de bolo</title>
    <link rel="manifest" href="./manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f0f0f; color: #e5e7eb; font-family: 'Inter', sans-serif; }
        .card-glass { background: #1a1a1a; border: 1px solid #2d2d2d; border-radius: 1rem; }
        .text-lucro { color: #10b981; }
        .text-custo { color: #ef4444; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 pb-20">

    <div id="loader" class="fixed inset-0 bg-black flex flex-col items-center justify-center z-50 transition-opacity duration-500">
        <div class="text-emerald-500 animate-spin text-4xl mb-2"><i class="fas fa-circle-notch"></i></div>
        <p class="text-xs text-gray-500">Buscando dados na planilha...</p>
    </div>

    <div class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-2xl font-bold">Resumo</h1>
            <p class="text-[10px] text-gray-500 uppercase tracking-tighter">Último Sync: <span id="u_time">--:--</span></p>
        </div>
        <div class="bg-emerald-500/10 p-3 rounded-xl"><i class="fas fa-wallet text-emerald-500 text-xl"></i></div>
    </div>

    <div class="grid grid-cols-1 gap-4 mb-6">
        <div class="card-glass p-6 border-l-4 border-emerald-500">
            <p class="text-gray-400 text-sm font-medium">Ganhos do Mês</p>
            <h2 class="text-4xl font-black text-white mt-1" id="m_ganho">R$ 0,00</h2>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div class="card-glass p-4 text-center">
                <p class="text-gray-400 text-[10px] uppercase">Custos</p>
                <p class="text-lg font-bold text-custo" id="m_custo">R$ 0,00</p>
            </div>
            <div class="card-glass p-4 text-center">
                <p class="text-gray-400 text-[10px] uppercase">Lucro Líquido</p>
                <p class="text-lg font-bold text-lucro" id="m_lucro">R$ 0,00</p>
            </div>
        </div>
    </div>

    <div class="card-glass p-4 mb-6">
        <div class="flex justify-between items-center mb-4">
            <h3 class="font-bold text-sm text-gray-400">Histórico de Ganhos</h3>
            <select id="seletor_mes" class="bg-gray-800 text-emerald-500 text-xs font-bold outline-none rounded-lg px-2 py-1 border border-gray-700"></select>
        </div>
        <canvas id="chartBarras" height="150"></canvas>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbz46GD15sCw-jpmgsreKhWm_rSEe_wJ-4RUHGUXGz5DnJJ_HjQzIHgctC6VUuTO62Hfaw/exec';
        let dadosMensais = [];
        let barChart = null;

        const fmt = (v) => (v || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

        async function init() {
            try {
                const response = await fetch(API_URL, { redirect: 'follow' });
                const data = await response.json();
                
                document.getElementById('u_time').innerText = data.atualizado_em;
                document.getElementById('m_ganho').innerText = fmt(data.mensal.ganho);
                document.getElementById('m_custo').innerText = fmt(data.mensal.custo);
                document.getElementById('m_lucro').innerText = fmt(data.mensal.lucro);

                dadosMensais = data.filtros_mensais;
                const seletor = document.getElementById('seletor_mes');
                seletor.innerHTML = dadosMensais.map(m => `<option value="${m.id}">${m.mes}</option>`).join('');
                seletor.value = new Date().getMonth() + 1;

                renderChart(dadosMensais);
                
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            } catch (err) {
                console.error("Erro:", err);
                document.getElementById('loader').innerHTML = `<p class="text-red-500">Erro ao carregar dados.</p>`;
            }
        }

        function renderChart(meses) {
            const ctx = document.getElementById('chartBarras').getContext('2d');
            if(barChart) barChart.destroy();
            barChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: meses.map(m => m.mes),
                    datasets: [{ 
                        data: meses.map(m => m.ganho), 
                        backgroundColor: '#10b981', 
                        borderRadius: 6 
                    }]
                },
                options: {
                    plugins: { legend: { display: false } },
                    scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: '#555' } } }
                }
            });
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(e => console.log("SW Error"));
            });
        }
        init();
    </script>
</body>
</html>
